name: Build mkfw

on:
  push:
    branches: [master, emscripten-support]
  pull_request:
    branches: [master]

jobs:
  linux-gcc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxi-dev libxrandr-dev libgl-dev libasound2-dev
      - name: Build example
        run: |
          cd mkfw_run_example
          gcc mkfw_run_example.c -I.. -lX11 -lXi -lXrandr -lGL -lm -lpthread -lasound -o mkfw_run_example -O2 -Wall -Wextra

  windows-clang-cl:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build example
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cd mkfw_run_example
          clang-cl /O2 /W4 /I.. mkfw_run_example.c opengl32.lib gdi32.lib winmm.lib ole32.lib avrt.lib user32.lib /Fe:mkfw_run_example.exe

  emscripten:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
      - name: Build example
        run: |
          cd mkfw_run_example
          emcc mkfw_run_example.c -I.. -sUSE_WEBGL2=1 -sFULL_ES3=1 -sAUDIO_WORKLET=1 -sWASM_WORKERS=1 -o mkfw_run_example.html -O2

