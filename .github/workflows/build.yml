name: Build mkfw

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  linux-gcc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install development headers
        # Runtime libraries are dlopen'd; only the headers are needed at
        # compile time.  See the Linking section in README.md.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxi-dev libxrandr-dev libxcursor-dev \
            libgl-dev libasound2-dev
      - name: Build examples
        run: bash examples/build_examples.sh
      - name: Build tests
        run: bash tests/build_tests.sh

  windows-clang-cl:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build examples and tests
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          set CFLAGS=/O2 /W3 /D_CRT_SECURE_NO_WARNINGS -Wno-unused-parameter
          set LIBS=opengl32.lib gdi32.lib winmm.lib user32.lib shell32.lib ole32.lib avrt.lib uuid.lib

          pushd examples
          clang-cl %CFLAGS% /I.. joystick.c     %LIBS% /Fe:joystick.exe     || exit /b 1
          clang-cl %CFLAGS% /I.. threaded.c     %LIBS% /Fe:threaded.exe     || exit /b 1
          clang-cl %CFLAGS% /I.. monitor.c      %LIBS% /Fe:monitor.exe      || exit /b 1
          clang-cl %CFLAGS% /I.. transparency.c %LIBS% /Fe:transparency.exe || exit /b 1
          clang-cl %CFLAGS% /I.. audio_beep.c   %LIBS% /Fe:audio_beep.exe   || exit /b 1
          clang-cl %CFLAGS% /I.. multi_window.c %LIBS% /Fe:multi_window.exe || exit /b 1
          popd

          pushd tests
          clang-cl %CFLAGS% /I.. smoke.c        %LIBS% /Fe:smoke.exe        || exit /b 1
          clang-cl %CFLAGS% /I.. multi_window.c %LIBS% /Fe:multi_window.exe || exit /b 1
          popd
